name: 카페24 자동 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cafe24-deploy
  cancel-in-progress: true

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 업로드 대상에서 제외할 파일 삭제 (체크아웃 사본에서만 — 실제 레포는 안 건드림)
        run: rm -rf .git .github README.md

      - name: lftp 설치
        run: sudo apt-get update -qq && sudo apt-get install -yqq lftp

      - name: (1회성) 이전 실수로 올라간 .git 등 정리
        env:
          FTP_PASS: ${{ secrets.CAFE24_FTP_PASSWORD }}
        run: |
          lftp -u "designhadam,$FTP_PASS" www.designhadam.com <<'EOF' || true
          set ftp:ssl-allow no
          cd app
          rm -rf .git
          rm -rf .github
          bye
          EOF

      - name: FTP 업로드 (카페24 계정 루트 = /www, 실제 목적지는 /app/)
        env:
          FTP_PASS: ${{ secrets.CAFE24_FTP_PASSWORD }}
        run: |
          lftp -u "designhadam,$FTP_PASS" www.designhadam.com <<'EOF'
          set ftp:ssl-allow no
          set mirror:parallel-transfer-count 3
          set net:max-retries 3
          mirror --reverse --verbose ./ /app/
          bye
          EOF
