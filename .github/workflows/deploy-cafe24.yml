name: 카페24 자동 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cafe24-deploy
  cancel-in-progress: true

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 테스트로 생성됐던 파일 정리 (임시)
        env:
          FTP_PASS: ${{ secrets.CAFE24_FTP_PASSWORD }}
        run: |
          set +e +x
          curl -s --disable-epsv -u "designhadam:$FTP_PASS" -Q "RMD www/www/app/testdir" -Q "RMD www/www/app" -Q "RMD www/www" -Q "DELE app/hello.txt" "ftp://www.designhadam.com/" > /dev/null 2>&1
          echo "정리 시도 완료 (일부 실패는 정상 — 이미 없는 경로일 수 있음)"

      - name: FTP 업로드 (카페24 계정 루트 = /www, 실제 목적지는 /app/)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: www.designhadam.com
          username: designhadam
          password: ${{ secrets.CAFE24_FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: /app/
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            README.md
