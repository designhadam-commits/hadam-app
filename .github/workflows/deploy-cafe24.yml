name: 카페24 자동 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cafe24-deploy
  cancel-in-progress: true

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 업로드 대상에서 제외할 파일 삭제 (체크아웃 사본에서만 — 실제 레포는 안 건드림)
        run: rm -rf .git .github README.md

      - name: FTP 업로드 (curl 직접 STOR — lftp mirror의 삭제후재생성 방식이
          이 서버에서 실패해서 검증된 방식으로 대체)
        env:
          FTP_PASS: ${{ secrets.CAFE24_FTP_PASSWORD }}
        run: |
          set +e
          find . -type f -print0 | xargs -0 -P 8 -I{} bash -c '
            f="{}"
            rel="${f#./}"
            for attempt in 1 2 3; do
              curl -sS --disable-epsv --ftp-create-dirs -u "designhadam:$1" -T "$f" "ftp://www.designhadam.com/app/$rel" && exit 0
              sleep 2
            done
            echo "FAILED: $rel" >> /tmp/ftp_failures.txt
          ' _ "$FTP_PASS"
          total=$(find . -type f | wc -l)
          fail=$(wc -l < /tmp/ftp_failures.txt 2>/dev/null || echo 0)
          echo "업로드 시도: $total개 / 실패: $fail개"
          if [ "$fail" -gt 0 ]; then
            echo "실패 목록:"; cat /tmp/ftp_failures.txt
            exit 1
          fi
