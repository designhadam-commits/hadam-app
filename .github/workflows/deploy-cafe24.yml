name: 카페24 자동 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cafe24-deploy
  cancel-in-progress: true

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: lftp 설치
        run: sudo apt-get update -qq && sudo apt-get install -yqq lftp

      - name: 경로 진단 (임시)
        env:
          FTP_PASS: ${{ secrets.CAFE24_FTP_PASSWORD }}
        run: |
          set +x
          lftp -u "designhadam,$FTP_PASS" www.designhadam.com > /tmp/ftpdebug.txt 2>&1 <<'EOF' || true
          set ftp:ssl-allow no
          set ftp:passive-mode true
          echo "== pwd =="
          pwd
          echo "== cd / =="
          cd /
          pwd
          echo "== cd www =="
          cd www
          pwd
          echo "== cd app (relative to www) =="
          cd app
          pwd
          bye
          EOF
          echo "----- 결과 (비밀번호는 마스킹됨) -----"
          sed "s/$FTP_PASS/[PASSWORD]/g" /tmp/ftpdebug.txt
