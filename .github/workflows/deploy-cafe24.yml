name: 카페24 자동 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cafe24-deploy
  cancel-in-progress: true

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: lftp 설치
        run: sudo apt-get update -qq && sudo apt-get install -yqq lftp

      - name: 경로 진단 (임시)
        env:
          FTP_PASS: ${{ secrets.CAFE24_FTP_PASSWORD }}
        run: |
          lftp -u "designhadam,$FTP_PASS" www.designhadam.com <<'EOF'
          set ftp:ssl-allow no
          pwd
          ls -a
          cd app
          pwd
          ls -a
          bye
          EOF
