name: 카페24 자동 배포

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cafe24-deploy
  cancel-in-progress: true

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: lftp 설치
        run: sudo apt-get update -qq && sudo apt-get install -yqq lftp

      - name: FTP 업로드 (카페24 계정 루트 = /www, 실제 목적지는 /app/)
        env:
          FTP_PASS: ${{ secrets.CAFE24_FTP_PASSWORD }}
        run: |
          lftp -u "designhadam,$FTP_PASS" www.designhadam.com <<'EOF'
          set ftp:ssl-allow no
          set mirror:parallel-transfer-count 3
          set net:max-retries 3
          mirror --reverse --verbose --delete --use-cache=no \
            --exclude-glob .git* \
            --exclude .github/ \
            --exclude-glob README.md \
            ./ /app/
          bye
          EOF
