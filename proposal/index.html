<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>자재 내역서 — 디자인하담</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="자재내역서">
<link rel="stylesheet" crossorigin="anonymous" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#eceef0;--card:#fff;--card2:#f6f7f9;--border:#e5e8eb;--line:#ececec;
  --text:#1a1a1a;--muted:#6b7280;--dim:#9aa3ad;
  --accent:#1f2937;--gold:#9a7b4f;--blue:#3182f6;--blue-dim:#e8f1fd;--red:#f04452;
  --radius:14px;--radius-s:9px;
  --shadow:0 1px 3px rgba(0,27,55,.06),0 1px 2px rgba(0,27,55,.04);
  --shadow-h:0 10px 34px rgba(0,27,55,.14);
}
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;font-size:14px;line-height:1.5;-webkit-text-size-adjust:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:inherit;font-size:14px;color:var(--text)}
img{display:block}

/* ── 상단바 ── */
.topbar{position:sticky;top:0;z-index:40;height:56px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:0 16px}
.topbar .logo{font-weight:800;letter-spacing:-.02em;font-size:16px;display:flex;align-items:center;gap:8px}
.topbar .logo .dot{width:9px;height:9px;border-radius:3px;background:var(--text)}
.topbar .sub{color:var(--dim);font-size:12px;font-weight:500}
.topbar .spacer{flex:1}
.btn{height:38px;padding:0 15px;border-radius:10px;font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px;transition:.15s;white-space:nowrap}
.btn.primary{background:var(--accent);color:#fff}
.btn.primary:hover{background:#000}
.btn.ghost{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn.ghost:hover{background:#eef0f3}
.btn.sm{height:32px;padding:0 12px;font-size:12px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ── 레이아웃 ── */
.wrap{display:flex;height:calc(100vh - 56px);overflow:hidden}
.pane{overflow-y:auto;height:100%}
.editor{width:430px;flex-shrink:0;border-right:1px solid var(--border);background:var(--bg);padding:18px}
.preview-pane{flex:1;background:#d9dcdf;padding:30px 20px;display:flex;flex-direction:column;align-items:center;gap:22px}

/* ── 편집기 ── */
.section-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:14px;box-shadow:var(--shadow)}
.section-card h3{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:12px}
.field{margin-bottom:10px}.field:last-child{margin-bottom:0}
.field label{display:block;font-size:12px;color:var(--dim);margin-bottom:4px;font-weight:600}
.field input,.field textarea,.field select{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:var(--radius-s);padding:9px 11px;transition:.15s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--blue);background:#fff}
.field.row{display:flex;gap:8px}.field.row>div{flex:1}

.room{margin-bottom:10px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.room-head{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;user-select:none}
.room-head .ico{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:15px;background:var(--card2)}
.room-head .nm{font-weight:700;font-size:14.5px}
.room-head .cnt{font-size:11px;color:#fff;background:var(--accent);border-radius:20px;padding:1px 8px;font-weight:700;min-width:20px;text-align:center}
.room-head .cnt.zero{background:#cfd4da}
.room-head .ren{margin-left:auto;color:var(--dim);font-size:13px;padding:3px 6px;border-radius:6px}
.room-head .ren:hover{background:var(--card2);color:var(--text)}
.room-head .chev{color:var(--dim);transition:.2s}
.room.collapsed .room-body{display:none}.room.collapsed .chev{transform:rotate(-90deg)}
.room-body{padding:0 14px 14px}

.item{display:flex;gap:10px;align-items:center;padding:8px;border:1px solid var(--border);border-radius:var(--radius-s);margin-bottom:8px;background:var(--card2)}
.item img,.item .noimg{width:44px;height:44px;border-radius:7px;object-fit:cover;flex-shrink:0;background:#e9ebee}
.item .noimg{display:grid;place-items:center;color:var(--dim);font-size:16px}
.item .meta{flex:1;min-width:0}
.item .meta .t{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .meta .s{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .ctag{font-size:10px;font-weight:700;color:var(--gold);background:#f5efe6;border-radius:5px;padding:1px 6px;flex-shrink:0}
.item .del{color:var(--dim);font-size:17px;padding:4px 6px;border-radius:6px;flex-shrink:0}
.item .del:hover{color:var(--red);background:#fde9eb}
.add-btn{width:100%;border:1.5px dashed var(--border);border-radius:var(--radius-s);padding:9px;color:var(--accent);font-weight:600;font-size:13px;transition:.15s;margin-top:2px}
.add-btn:hover{border-color:var(--accent);background:var(--card2)}
/* 벽 단면 편집 */
.wall-sec{margin-top:8px;border-top:1px dashed var(--border);padding-top:8px}
.wall-h{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:6px}
.wall-h span{color:var(--dim);font-weight:500}
.layer-row{display:flex;align-items:center;gap:5px;margin-bottom:5px}
.layer-row input[type=color]{width:26px;height:28px;padding:0;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;flex-shrink:0}
.layer-row .ln{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:6px 8px;min-width:0}
.layer-row .lt{width:56px;background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:6px;text-align:right}
.layer-row .mm{font-size:11px;color:var(--dim)}
.layer-row .del{color:var(--dim);font-size:16px;padding:2px 5px;border-radius:5px}
.layer-row .del:hover{color:var(--red);background:#fde9eb}
.add-layer{font-size:12px;font-weight:600;color:var(--accent);padding:5px 0}
/* 벽 단면 다이어그램(미리보기) */
.wall-dia{margin-top:6mm;border:1px solid var(--line);border-radius:3mm;padding:4mm;break-inside:avoid}
.wall-dia-t{font-size:10pt;font-weight:800;margin-bottom:3mm;display:flex;justify-content:space-between;align-items:baseline}
.wall-dia-t span{font-size:8.5pt;color:var(--muted);font-weight:600}
.wall-ax{display:flex;justify-content:space-between;font-size:7.5pt;color:var(--dim);margin-bottom:1.5mm}
.wall-bands{display:flex;height:15mm;border-radius:2mm;overflow:hidden;border:1px solid var(--line)}
.wband{min-width:5mm;border-right:1px solid rgba(255,255,255,.5)}
.wband:last-child{border-right:none}
.wall-legend{display:flex;flex-wrap:wrap;gap:2mm 6mm;margin-top:3mm;font-size:8.5pt;color:var(--text)}
.wall-legend .wlg{display:flex;align-items:center;gap:1.5mm}
.wall-legend .wlg i{width:3mm;height:3mm;border-radius:1mm;display:inline-block;border:1px solid rgba(0,0,0,.12)}
.wall-legend b{font-weight:700;color:var(--muted)}

/* ════════ A4 미리보기 ════════ */
.page{width:210mm;min-height:297mm;background:#fff;box-shadow:var(--shadow-h);position:relative;overflow:hidden;flex-shrink:0}
.page-pad{padding:16mm 15mm}

/* 표지(무드보드) */
.cv-top{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--accent);padding-bottom:7mm}
.cv-top .lbl{font-size:10pt;letter-spacing:.42em;color:var(--gold);font-weight:700;margin-bottom:3mm}
.cv-top .site{font-size:25pt;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.cv-top .site .small{font-size:13pt;color:var(--muted);font-weight:600;display:block;margin-top:2mm}
.cv-top .brand{text-align:right;font-size:9pt;color:var(--muted);line-height:1.7;white-space:nowrap}
.cv-top .brand b{display:block;color:var(--text);font-size:13pt;font-weight:800;letter-spacing:.02em}
.cv-info{display:flex;flex-wrap:wrap;gap:3mm 9mm;font-size:9.5pt;color:var(--muted);padding:5mm 0 0}
.cv-info b{color:var(--text);font-weight:600;margin-left:2mm}
.cv-board-t{font-size:11pt;font-weight:800;margin:9mm 0 4mm;display:flex;align-items:center;gap:3mm}
.cv-board-t .ln{flex:1;height:1px;background:var(--line)}
.cv-board-t .n{font-size:8.5pt;color:var(--dim);font-weight:600}
.moodgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:3mm}
.mood{border:1px solid var(--line);border-radius:3mm;overflow:hidden;background:#fafafa}
.mood .ph{width:100%;aspect-ratio:1/1;object-fit:cover;background:#f1f5f9}
.mood .noimg{width:100%;aspect-ratio:1/1;display:grid;place-items:center;color:#cfd6dd;font-size:18pt;background:#f4f6f8}
.mood .cap{padding:2mm 2.5mm}
.mood .cap .c{font-size:7pt;font-weight:700;color:var(--gold);letter-spacing:.02em}
.mood .cap .n{font-size:8pt;font-weight:600;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mood .cap .r{font-size:7pt;color:var(--dim)}
.cv-empty{text-align:center;color:#c2c9d0;padding:40mm 0;font-size:11pt}
.cv-foot{position:absolute;left:15mm;right:15mm;bottom:10mm;padding-top:4mm;border-top:1px solid var(--line);font-size:8pt;color:var(--dim);display:flex;justify-content:space-between;white-space:pre-wrap}

/* 방별 페이지 */
.rm-head{display:flex;align-items:baseline;gap:4mm;border-bottom:2px solid var(--accent);padding-bottom:4mm;margin-bottom:6mm}
.rm-head .rico{font-size:15pt}
.rm-head .rt{font-size:18pt;font-weight:800;letter-spacing:-.01em}
.rm-head .rn{font-size:9pt;color:var(--dim);font-weight:600;margin-left:auto;align-self:flex-end}
.rm-head .pjt{font-size:8.5pt;color:var(--muted);align-self:flex-end}
.rm-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5mm}
.rcard{border:1px solid var(--line);border-radius:3mm;overflow:hidden;display:flex;background:#fff;break-inside:avoid}
.rcard .ph{width:32mm;height:32mm;object-fit:cover;flex-shrink:0;background:#f1f5f9}
.rcard .noimg{width:32mm;height:32mm;display:grid;place-items:center;color:#cfd6dd;font-size:16pt;flex-shrink:0;background:#f4f6f8}
.rcard .rb{padding:3mm 3.5mm;min-width:0;flex:1}
.rcard .rc{font-size:7.5pt;font-weight:700;color:var(--gold);letter-spacing:.04em;margin-bottom:.6mm}
.rcard .rnm{font-size:10pt;font-weight:700;line-height:1.25;word-break:keep-all;margin-bottom:1mm}
.rcard .rmk{font-size:8pt;color:var(--blue);font-weight:600;margin-bottom:1.5mm}
.rcard .rspec{font-size:8pt;color:var(--muted);line-height:1.45}
.rcard .rsize{font-size:8pt;color:var(--muted);margin-top:.6mm}
.pagenum{position:absolute;right:15mm;bottom:10mm;font-size:8pt;color:var(--dim)}
.pagefoot{position:absolute;left:15mm;bottom:10mm;font-size:8pt;color:var(--dim)}

/* 모달(피커) */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:18px;width:min(760px,100%);max-height:88vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--shadow-h)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.modal-head .mt{font-weight:800;font-size:16px}
.modal-head .x{margin-left:auto;color:var(--dim);font-size:22px;line-height:1;padding:4px 8px;border-radius:8px}
.modal-head .x:hover{background:var(--card2);color:var(--text)}
.tabs{display:flex;gap:6px;padding:12px 20px 0}
.tab{padding:8px 14px;border-radius:10px;font-weight:700;font-size:13px;color:var(--muted);background:var(--card2)}
.tab.active{background:var(--accent);color:#fff}
.modal-body{padding:12px 20px 20px;overflow-y:auto}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.chip{padding:6px 11px;border-radius:20px;font-size:12px;font-weight:600;background:var(--card2);border:1px solid var(--border);color:var(--muted)}
.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.search-bar{margin-bottom:12px}
.search-bar input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:10px 13px}
.search-bar input:focus{outline:none;border-color:var(--blue);background:#fff}
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:10px}
.lib-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:.12s;background:#fff}
.lib-card:hover{border-color:var(--accent);box-shadow:var(--shadow-h);transform:translateY(-2px)}
.lib-card img{width:100%;aspect-ratio:1/1;object-fit:cover;background:#f1f5f9}
.lib-card .lc{padding:7px 8px}
.lib-card .lc .lm{font-size:10.5px;color:var(--blue);font-weight:600}
.lib-card .lc .ln{font-size:12px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-empty,.lib-more{text-align:center;color:var(--dim);padding:24px 0;font-size:12px}
.upload-drop{border:1.5px dashed var(--border);border-radius:12px;padding:20px;text-align:center;color:var(--dim);cursor:pointer;margin-bottom:12px}
.upload-drop:hover{border-color:var(--blue);color:var(--blue)}
.upload-drop img{max-width:130px;max-height:130px;margin:0 auto;border-radius:8px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:200;opacity:0;transition:.25s;pointer-events:none}
.toast.show{opacity:1}

@media(max-width:900px){
  .wrap{flex-direction:column;height:auto;overflow:visible}
  .editor{width:100%;border-right:none;border-bottom:1px solid var(--border);height:auto}
  .preview-pane{padding:14px 6px}
  .pane{height:auto;overflow:visible}
  .page{width:100%;min-height:auto}
}

/* ════════ A4 인쇄 ════════ */
@page{size:A4;margin:0}
@media print{
  html,body{background:#fff!important}
  .topbar,.editor,.no-print,.overlay,.toast{display:none!important}
  .wrap{display:block;height:auto;overflow:visible}
  .preview-pane{display:block;padding:0;background:#fff;gap:0}
  .pane{height:auto;overflow:visible}
  .page{box-shadow:none;width:210mm;min-height:297mm;margin:0;page-break-after:always;break-after:page}
  .page:last-child{page-break-after:auto}
  .rcard,.mood{break-inside:avoid}
  -webkit-print-color-adjust:exact;print-color-adjust:exact;
}
</style>
</head>
<body>
<div class="topbar">
  <span class="logo"><span class="dot"></span>자재 내역서</span>
  <span class="sub">디자인하담</span>
  <span class="spacer"></span>
  <button class="btn ghost sm" id="btnReset">초기화</button>
  <button class="btn ghost" id="btnPng">📷 이미지</button>
  <button class="btn primary" id="btnPrint">🖨️ A4 인쇄 / PDF</button>
</div>

<div class="wrap">
  <!-- 편집기 -->
  <div class="pane editor">
    <div class="section-card">
      <h3>현장 정보</h3>
      <div class="field"><label>현장명 / 프로젝트</label><input id="f_site" placeholder="예: 래미안 강동 84A형"></div>
      <div class="field row">
        <div><label>고객명</label><input id="f_client" placeholder="예: 김○○ 고객님"></div>
        <div><label>작성일</label><input id="f_date" type="date"></div>
      </div>
      <div class="field row">
        <div><label>담당 디자이너</label><input id="f_designer" placeholder="예: 홍길동"></div>
        <div><label>연락처</label><input id="f_phone" placeholder="010-0000-0000"></div>
      </div>
      <div class="field"><label>비고 / 안내문구</label><textarea id="f_memo" rows="2"></textarea></div>
    </div>
    <div id="rooms"></div>
    <button class="btn ghost" id="btnAddRoom" style="width:100%">+ 공간(방) 추가</button>
  </div>

  <!-- A4 미리보기 -->
  <div class="pane preview-pane" id="preview"></div>
</div>

<!-- 피커 모달 -->
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-head">
      <span class="mt" id="mTitle">자재 추가</span>
      <button class="x" id="mClose">×</button>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="lib">📚 라이브러리에서 찾기</button>
      <button class="tab" data-tab="manual">✏️ 직접 입력</button>
    </div>
    <div class="modal-body">
      <div id="tabLib">
        <div class="chips" id="catChips"></div>
        <div class="search-bar"><input id="libSearch" placeholder="제품명·제조사·코드 검색 (예: 디아망, 화이트, FMKG)"></div>
        <div class="lib-grid" id="libGrid"></div>
        <div class="lib-more" id="libMore"></div>
      </div>
      <div id="tabManual" style="display:none">
        <div class="upload-drop" id="dropZone"><div id="dropText">📁 이미지 클릭/드래그 업로드</div><input type="file" id="fileInput" accept="image/*" hidden></div>
        <div class="field"><label>카테고리</label><select id="m_cat"></select></div>
        <div class="field"><label>제품명 *</label><input id="m_name" placeholder="예: 아메리칸스탠다드 원피스 양변기"></div>
        <div class="field row">
          <div><label>제조사 / 브랜드</label><input id="m_maker"></div>
          <div><label>모델 / 코드</label><input id="m_code"></div>
        </div>
        <div class="field"><label>규격 / 스펙</label><input id="m_spec" placeholder="예: 색상 화이트 / 600×400"></div>
        <button class="btn primary" id="m_add" style="width:100%;margin-top:4px">이 공간에 추가</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ───────── 설정 ─────────
const CATS = ['도기','수전','타일','필름','장판','마루','벽지','몰딩','걸레받이','보드','팬','조명','기타'];
const CAT_ICO={'도기':'🚽','수전':'🚰','타일':'🧱','필름':'🎞️','장판':'🟫','마루':'🪵','벽지':'🧻','몰딩':'📏','걸레받이':'📐','보드':'▦','팬':'🌀','조명':'💡','기타':'📦'};
const ROOM_ICO={'거실':'🛋️','주방':'🍳','안방':'🛏️','침실':'🛏️','욕실':'🛁','공용욕실':'🛁','안방욕실':'🛁','드레스룸':'👗','현관':'🚪','베란다':'🪴','작은방':'🚪','서재':'📚','공용':'🏠','기타':'📦'};
const DEFAULT_ROOMS=['거실','주방','안방','욕실','현관'];
const LS_KEY='hadam-spec-v2';
let LIB={items:[]};
let state=null;
let picker={room:null, tab:'lib', cat:'전체', img:null};

const $=s=>document.querySelector(s);

// ───────── 상태 ─────────
function blankState(){
  const d=new Date();
  const iso=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  return {
    site:{name:'',client:'',date:iso,designer:'',phone:'',memo:'실제 색상은 조명 및 모니터 환경에 따라 다르게 보일 수 있습니다.'},
    rooms:DEFAULT_ROOMS.map(k=>({key:k,open:true,items:[],layers:[]})),
  };
}
function load(){ try{const s=JSON.parse(localStorage.getItem(LS_KEY));if(s&&s.rooms)return s;}catch(e){}
  // v1 마이그레이션(카테고리형 → 위치기반 방 분배)
  try{const old=JSON.parse(localStorage.getItem('hadam-spec-v1'));
    if(old&&old.cats){const st=blankState();st.site=old.site||st.site;const byRoom={};
      old.cats.forEach(c=>c.items.forEach(it=>{const rm=(it.loc||'기타').trim()||'기타';(byRoom[rm]=byRoom[rm]||[]).push({cat:c.key,name:it.name,maker:it.maker,code:it.code,spec:it.spec,size:it.size,img:it.img});}));
      st.rooms=Object.keys(byRoom).map(k=>({key:k,open:true,items:byRoom[k]}));return st;}
  }catch(e){}
  return blankState();
}
function save(){try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}}
function rico(k){return ROOM_ICO[k]||'🏠';}

// ───────── 편집기 ─────────
function bindSite(){
  const map={f_site:'name',f_client:'client',f_date:'date',f_designer:'designer',f_phone:'phone',f_memo:'memo'};
  for(const[id,k]of Object.entries(map)){const el=$('#'+id);el.value=state.site[k]||'';el.oninput=()=>{state.site[k]=el.value;save();renderPreview();};}
}
function renderEditor(){
  const box=$('#rooms');box.innerHTML='';
  state.rooms.forEach((room,ri)=>{
    const el=document.createElement('div');el.className='room'+(room.open?'':' collapsed');
    el.innerHTML=`<div class="room-head">
      <span class="ico">${rico(room.key)}</span><span class="nm">${esc(room.key)}</span>
      <span class="cnt ${room.items.length?'':'zero'}">${room.items.length}</span>
      <span class="ren" title="이름변경">✎</span><span class="ren del-room" title="삭제">🗑</span>
      <span class="chev">▾</span></div><div class="room-body"></div>`;
    el.querySelector('.room-head').onclick=(e)=>{if(e.target.classList.contains('ren'))return;room.open=!room.open;save();renderEditor();};
    el.querySelector('.ren[title=이름변경]').onclick=()=>{const n=prompt('공간 이름',room.key);if(n&&n.trim()){room.key=n.trim();save();renderEditor();renderPreview();}};
    el.querySelector('.del-room').onclick=()=>{if(confirm(`'${room.key}' 공간을 삭제할까요?`)){state.rooms.splice(ri,1);save();renderEditor();renderPreview();}};
    const body=el.querySelector('.room-body');
    room.items.forEach((it,ii)=>{
      const row=document.createElement('div');row.className='item';
      row.innerHTML=`${it.img?`<img src="${it.img}" loading="lazy">`:'<div class="noimg">▦</div>'}
        <div class="meta"><div class="t">${esc(it.name||'(이름없음)')}</div>
        <div class="s">${esc([it.maker,it.code,it.spec,it.size].filter(Boolean).join(' · ')||'—')}</div></div>
        <span class="ctag">${esc(it.cat||'')}</span><button class="del">×</button>`;
      row.querySelector('.del').onclick=()=>{room.items.splice(ii,1);save();renderEditor();renderPreview();};
      body.appendChild(row);
    });
    const add=document.createElement('button');add.className='add-btn';add.textContent='+ 자재 추가';
    add.onclick=()=>openPicker(ri);body.appendChild(add);
    // 벽 단면 구성
    const layers=ensureLayers(room);
    const ws=document.createElement('div');ws.className='wall-sec';
    ws.innerHTML='<div class="wall-h">🧱 벽 단면 구성 <span>(실외/구조 → 실내 순)</span></div>';
    const ll=document.createElement('div');ll.className='layer-list';
    layers.forEach((L,li)=>{
      const r=document.createElement('div');r.className='layer-row';
      r.innerHTML=`<input type="color" value="${L.color||'#cccccc'}"><input class="ln" placeholder="레이어/자재명 (예: 단열재)" value="${esc(L.name||'')}"><input class="lt" type="number" placeholder="두께" value="${L.thick||''}"><span class="mm">mm</span><button class="del">×</button>`;
      const ins=r.querySelectorAll('input');
      ins[0].oninput=()=>{L.color=ins[0].value;save();renderPreview();};
      ins[1].oninput=()=>{L.name=ins[1].value;save();renderPreview();};
      ins[2].oninput=()=>{L.thick=ins[2].value;save();renderPreview();};
      r.querySelector('.del').onclick=()=>{layers.splice(li,1);save();renderEditor();renderPreview();};
      ll.appendChild(r);
    });
    ws.appendChild(ll);
    const al=document.createElement('button');al.className='add-layer';al.textContent='+ 레이어';
    al.onclick=()=>addLayer(ri);ws.appendChild(al);
    body.appendChild(ws);
    box.appendChild(el);
  });
}

// ───────── A4 미리보기 ─────────
function fmtDate(s){if(!s)return'';const p=s.split('-');return p.length===3?`${p[0]}. ${p[1]}. ${p[2]}`:s;}
function allItems(){const a=[];state.rooms.forEach(r=>r.items.forEach(it=>a.push({...it,room:r.key})));return a;}
function renderPreview(){
  const s=state.site, pv=$('#preview');
  const usedRooms=state.rooms.filter(r=>r.items.length);
  const items=allItems();
  let pages='';
  // ── 표지(무드보드) ──
  pages+=`<div class="page"><div class="page-pad">
    <div class="cv-top">
      <div><div class="lbl">MATERIAL BOARD</div>
        <div class="site">${esc(s.name||'현장명을 입력하세요')}${s.client?`<span class="small">${esc(s.client)}</span>`:''}</div></div>
      <div class="brand"><b>디자인하담</b>DESIGN HADAM</div>
    </div>
    <div class="cv-info">
      ${s.date?`<span>작성일<b>${fmtDate(s.date)}</b></span>`:''}
      ${s.designer?`<span>담당<b>${esc(s.designer)}</b></span>`:''}
      ${s.phone?`<span>연락처<b>${esc(s.phone)}</b></span>`:''}
      <span>품목<b>${items.length}개 · ${usedRooms.length}개 공간</b></span>
    </div>
    <div class="cv-board-t">자재 무드보드<span class="ln"></span><span class="n">한눈에 보는 조합</span></div>`;
  if(!items.length){pages+=`<div class="cv-empty">왼쪽에서 공간별로 자재를 추가하면<br>여기에 무드보드가 만들어집니다.</div>`;}
  else{pages+='<div class="moodgrid">'+items.map(it=>`<div class="mood">
      ${it.img?`<img class="ph" src="${it.img}">`:'<div class="noimg">▦</div>'}
      <div class="cap"><div class="c">${esc(it.cat||'')}</div><div class="n">${esc(it.name||'')}</div><div class="r">${esc(it.room)}</div></div>
    </div>`).join('')+'</div>';}
  pages+=`<div class="cv-foot">${esc(s.memo||'')}\n디자인하담 · DESIGN HADAM</div></div></div>`;
  // ── 방별 페이지 ──
  let pageNo=1;
  usedRooms.forEach(room=>{
    pageNo++;
    pages+=`<div class="page"><div class="page-pad">
      <div class="rm-head"><span class="rico">${rico(room.key)}</span><span class="rt">${esc(room.key)}</span>
        <span class="pjt">${esc(s.name||'')}</span><span class="rn">${room.items.length}개 품목</span></div>
      <div class="rm-grid">`+room.items.map(it=>`<div class="rcard">
        ${it.img?`<img class="ph" src="${it.img}">`:'<div class="noimg">▦</div>'}
        <div class="rb"><div class="rc">${esc(it.cat||'')}</div>
          <div class="rnm">${esc(it.name||'(이름없음)')}</div>
          ${it.maker?`<div class="rmk">${esc(it.maker)}${it.code?' · '+esc(it.code):''}</div>`:''}
          ${it.spec?`<div class="rspec">${esc(it.spec)}</div>`:''}
          ${it.size?`<div class="rsize">규격 ${esc(it.size)}</div>`:''}
        </div></div>`).join('')+`</div>
      ${wallDiagram(room)}
      <div class="pagefoot">${esc(s.name||'')} · 자재 내역서</div><div class="pagenum">${pageNo}</div>
    </div></div>`;
  });
  pv.innerHTML=pages;
}

// ───────── 피커 ─────────
function openPicker(ri){
  picker={room:ri,tab:'lib',cat:'전체',img:null};
  $('#mTitle').textContent=`${state.rooms[ri].key} — 자재 추가`;
  // 카테고리 칩
  $('#catChips').innerHTML=['전체',...CATS].map(c=>`<button class="chip${c==='전체'?' active':''}" data-cat="${c}">${c==='전체'?'전체':((CAT_ICO[c]||'')+' '+c)}</button>`).join('');
  $('#catChips').querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{picker.cat=ch.dataset.cat;$('#catChips').querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x===ch));renderLib($('#libSearch').value);});
  // 직접입력 카테고리 옵션
  $('#m_cat').innerHTML=CATS.map(c=>`<option>${c}</option>`).join('');
  $('#libSearch').value='';clearManual();setTab('lib');renderLib('');
  $('#overlay').classList.add('show');setTimeout(()=>$('#libSearch').focus(),50);
}
function closePicker(){$('#overlay').classList.remove('show');}
function setTab(t){picker.tab=t;document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));$('#tabLib').style.display=t==='lib'?'':'none';$('#tabManual').style.display=t==='manual'?'':'none';}
function renderLib(q){
  q=(q||'').trim().toLowerCase();
  let res=LIB.items;
  if(picker.cat!=='전체')res=res.filter(it=>it.cat===picker.cat);
  if(q){const ts=q.split(/\s+/);res=res.filter(it=>ts.every(t=>it.q.includes(t)));}
  const grid=$('#libGrid'),cap=80;
  if(!res.length){grid.innerHTML=`<div class="lib-empty">결과 없음 — ‘직접 입력’ 탭을 이용하세요.</div>`;$('#libMore').textContent='';return;}
  grid.innerHTML=res.slice(0,cap).map(it=>`<div class="lib-card" data-id="${it.id}">
    <img src="${it.path}" loading="lazy"><div class="lc"><div class="lm">${esc(it.maker)}</div><div class="ln">${esc(it.name)}${it.code?' '+esc(it.code):''}</div></div></div>`).join('');
  $('#libMore').textContent=res.length>cap?`상위 ${cap}개 표시 · 검색으로 좁혀보세요 (총 ${res.length}개)`:`${res.length}개`;
  grid.querySelectorAll('.lib-card').forEach(c=>c.onclick=()=>{const it=LIB.items.find(x=>x.id==c.dataset.id);pickLib(it);});
}
function pickLib(it){
  const room=state.rooms[picker.room];
  room.items.push({cat:it.cat,name:it.name,maker:it.maker,code:it.code||'',spec:it.spec||'',size:it.size||'',img:it.path});
  room.open=true;save();renderEditor();renderPreview();closePicker();toast(`${it.name} 추가됨`);
}
function clearManual(){['m_name','m_maker','m_code','m_spec'].forEach(id=>$('#'+id).value='');picker.img=null;$('#dropText').textContent='📁 이미지 클릭/드래그 업로드';}
function addManual(){
  const name=$('#m_name').value.trim();if(!name){toast('제품명을 입력하세요');$('#m_name').focus();return;}
  const room=state.rooms[picker.room];
  room.items.push({cat:$('#m_cat').value,name,maker:$('#m_maker').value.trim(),code:$('#m_code').value.trim(),spec:$('#m_spec').value.trim(),size:'',img:picker.img});
  room.open=true;save();renderEditor();renderPreview();closePicker();toast(`${name} 추가됨`);
}
function handleFile(file){if(!file||!file.type.startsWith('image/'))return;const r=new FileReader();r.onload=e=>{picker.img=e.target.result;$('#dropText').innerHTML=`<img src="${picker.img}">`;};r.readAsDataURL(file);}

// ───────── 공간 추가 ─────────
function addRoom(){const n=prompt('추가할 공간 이름 (예: 드레스룸, 작은방, 공용욕실)');if(!n)return;const k=n.trim();if(!k)return;if(state.rooms.some(r=>r.key===k)){toast('이미 있는 공간입니다');return;}state.rooms.push({key:k,open:true,items:[],layers:[]});save();renderEditor();}
// ───────── 벽 단면 레이어 ─────────
const LAYER_COLORS=['#cdb38b','#e0a86b','#d8c44e','#bcae8f','#cfd3d8','#ece6da','#a9b0b8','#8d9298','#b98c5a','#9fb3a0'];
function ensureLayers(room){if(!Array.isArray(room.layers))room.layers=[];return room.layers;}
function addLayer(ri){const room=state.rooms[ri];const ls=ensureLayers(room);ls.push({name:'',thick:'',color:LAYER_COLORS[ls.length%LAYER_COLORS.length]});save();renderEditor();renderPreview();}
function wallDiagram(room){
  const ls=(room.layers||[]).filter(L=>(L.name&&L.name.trim())||L.thick);
  if(!ls.length)return'';
  const total=ls.reduce((s,L)=>s+(parseFloat(L.thick)||0),0);
  const bands=ls.map(L=>{const t=parseFloat(L.thick)||0;const w=total>0?Math.max(6,t/total*100):100/ls.length;return `<div class="wband" style="flex:${w.toFixed(2)};background:${L.color||'#ccc'}"></div>`;}).join('');
  const legend=ls.map((L,i)=>`<span class="wlg"><i style="background:${L.color||'#ccc'}"></i>${i+1}. ${esc(L.name||'-')}${L.thick?` <b>${esc(String(L.thick))}mm</b>`:''}</span>`).join('');
  return `<div class="wall-dia"><div class="wall-dia-t">벽 단면 구성${total?`<span>총 두께 ${total}mm</span>`:''}</div>
    <div class="wall-ax"><span>◀ 실외 / 구조체</span><span>실내 마감 ▶</span></div>
    <div class="wall-bands">${bands}</div><div class="wall-legend">${legend}</div></div>`;
}

// ───────── 출력 ─────────
function printSheet(){window.print();}
async function exportPng(){
  const pages=document.querySelectorAll('.page');if(!pages.length)return;
  const btn=$('#btnPng');btn.disabled=true;const old=btn.textContent;btn.textContent='생성 중…';
  try{const nm=(state.site.name||'자재내역서').replace(/[\\/:*?"<>|]/g,'_');
    for(let i=0;i<pages.length;i++){const u=await htmlToImage.toPng(pages[i],{pixelRatio:2,backgroundColor:'#fff',cacheBust:true});
      const a=document.createElement('a');a.download=`${nm}_${i===0?'무드보드':(i+'p')}.png`;a.href=u;a.click();await new Promise(r=>setTimeout(r,400));}
    toast('이미지 저장 완료');
  }catch(e){console.error(e);toast('저장 실패 — 로컬 서버로 열었는지 확인');}
  finally{btn.disabled=false;btn.textContent=old;}
}

// ───────── 유틸 ─────────
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
let toastT;function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1700);}

function bindEvents(){
  $('#btnPrint').onclick=printSheet;
  $('#btnPng').onclick=exportPng;
  $('#btnReset').onclick=()=>{if(confirm('모든 내용을 지우고 새로 시작할까요?')){state=blankState();save();bindSite();renderEditor();renderPreview();}};
  $('#btnAddRoom').onclick=addRoom;
  $('#mClose').onclick=closePicker;
  $('#overlay').onclick=e=>{if(e.target.id==='overlay')closePicker();};
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
  let st;$('#libSearch').oninput=e=>{clearTimeout(st);st=setTimeout(()=>renderLib(e.target.value),170);};
  $('#m_add').onclick=addManual;$('#m_name').onkeydown=e=>{if(e.key==='Enter')addManual();};
  const dz=$('#dropZone'),fi=$('#fileInput');
  dz.onclick=()=>fi.click();fi.onchange=e=>handleFile(e.target.files[0]);
  dz.ondragover=e=>{e.preventDefault();dz.style.borderColor='var(--blue)';};dz.ondragleave=()=>dz.style.borderColor='';
  dz.ondrop=e=>{e.preventDefault();dz.style.borderColor='';handleFile(e.dataTransfer.files[0]);};
  document.onkeydown=e=>{if(e.key==='Escape')closePicker();};
}
async function init(){
  try{const r=await fetch('library.json');LIB=await r.json();}catch(e){console.warn('library.json 로드 실패',e);toast('라이브러리 로드 실패 — 직접 입력만 가능');}
  state=load();bindSite();renderEditor();renderPreview();bindEvents();
}
init();
</script>
</body>
